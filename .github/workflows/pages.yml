name: Deploy employer capabilities site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Build static portfolio
        run: |
          mkdir -p _site
          cat .site-assets/portfolio-site-lite.tar.gz.b64.part-* | base64 --decode > /tmp/portfolio-site-lite.tar.gz
          tar -xzf /tmp/portfolio-site-lite.tar.gz -C _site
      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
